version: 1
name: all-nodes
description: Exercises every node type and construct.
inputs:
  slug: {type: string, required: true}
  feature: {type: string, default: "${inputs.slug}"}
defaults: {model: haiku, agent: general, max_visits: 5}
start: plan
nodes:
  - id: plan
    type: agent
    instruction: Write a plan.
    skill: plan
    model: sonnet
    inputs: {feature: "${inputs.feature}"}
    outputs: [summary]
    artifact: ".maestro/${inputs.slug}/plan.md"
    retries: 2
    next: check
  - id: check
    type: script
    run: [bash, "-c", "echo ok"]
    timeout: 60
    routes:
      - {when: "${steps.check.outputs.exit_code} == 0", to: approve}
      - {to: plan}
    on_fail: ask
  - id: approve
    type: gate
    prompt: "Approve ${steps.plan.outputs.summary}?"
    options:
      - {id: yes, label: Approve, to: fanout}
      - {id: revise, label: Revise, to: plan, input: feedback}
      - {id: no, label: Reject, to: abort}
  - id: fanout
    type: parallel
    join: all
    on_branch_fail: ask
    isolate: worktree
    branches:
      - id: be
        start: be_step
        steps:
          - id: be_step
            type: agent
            instruction: Backend work.
            outputs: [note]
            next: end
      - id: fe
        start: fe_step
        steps:
          - id: fe_step
            type: script
            run: ["true"]
            next: end
    next: child
  - id: child
    type: subworkflow
    workflow: testdata/workflows/valid-minimal.yaml
    inputs: {slug: "${inputs.slug}"}
    next: end
outputs:
  summary: "${steps.plan.outputs.summary}"
ui: {zoom: 1}
