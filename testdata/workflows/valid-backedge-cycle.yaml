version: 1
name: backedge
inputs:
  slug: {type: string, required: true}
start: work
nodes:
  - id: work
    type: agent
    instruction: Do work.
    outputs: [ok]
    next: review
  - id: review
    type: script
    run: [bash, "-c", "echo review"]
    max_visits: 3
    on_exhausted: escalate
    routes:
      - {when: "${steps.review.outputs.blocking} == true", to: work}
      - {to: end}
  - id: escalate
    type: gate
    prompt: Fix loop exhausted.
    options:
      - {id: giveup, label: Give up, to: abort}
      - {id: more, label: Keep trying, to: work}
