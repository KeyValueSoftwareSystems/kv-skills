# =============================================================================
# maestro.config.yaml — orchestration & enforcement (Conductor ONLY)
# =============================================================================
# The two-file model:
#   • skills.config.yaml (repo root) — WHICH skill (and external skill) backs
#     each slot. Read by BOTH slash commands and Conductor. Owns `tdd` etc.
#   • maestro.config.yaml (this file) — HOW Conductor orchestrates and ENFORCES:
#     fix-loop caps, gates, env/isolation, the default model, web port. Not needed
#     when a developer runs a skill via a slash command standalone.
#
# Anything that MUST hold is enforced by a script/CI step, not by a prompt.
#
# =============================================================================

# Bounded correction loop. NOTE: Conductor has no per-edge iteration counter, so
# this cap is enforced INSIDE the fix-loop skill (/fix) (which bounds itself to 3), not
# by a workflow route condition. The `fix` step in each pipeline invokes that skill.
fix_loop:
  max_attempts: 3

# Enforced by the verify script step / CI — never by a skill's prompt.
gates:
  coverage_threshold: 80
  require_tests_before_done: true   # enforced by the assert_* script steps (test -s on the artifact)
  freeze_approved_tests: true       # QA self-healing may not weaken assertions

# Environment lifecycle for script steps (kv/stack wrappers).
env:
  isolation_key: "{run_id}"
  teardown: always                  # stack down always runs, even on failure

# QA tiering (guidance consumed by the qa-automation skill).
e2e_tier: critical-journeys-only

# =============================================================================
# Models — per-agent model selection.
# =============================================================================
# Each provider-backed agent renders its model from the `model` workflow input:
#     model: "{{ workflow.input.model.<agent> | default('claude-haiku-4-5', true) }}"
# The `maestro` wrapper reads the `agents:` map below and passes it as
#     --input model='{"author_hld":"…", …}'
# so per-agent choices apply. A plain `conductor run` WITHOUT the wrapper passes no
# `model` input, so every agent falls back to the baked `claude-haiku-4-5` default.
#   • Bump ONE agent: set its entry under `agents:` below.
#   • Leave an agent OUT (or off this list): it runs on `claude-haiku-4-5`.
#   • `default:` is the fallback baked into each agent's `model:` line and used by
#     any step without an explicit entry.
models:
  default: claude-haiku-4-5   # fallback baked into every agent's model: line
  agents:                     # per-agent overrides; unlisted agents -> default
    # design.yaml
    author_hld:      claude-haiku-4-5
    refine_hld:      claude-haiku-4-5
    backend_design:  claude-haiku-4-5
    frontend_design: claude-haiku-4-5
    contract:        claude-haiku-4-5
    # main.yaml
    arch_review:     claude-haiku-4-5
    review_pack:     claude-haiku-4-5
    # backend_impl.yaml + frontend_impl.yaml (shared agent names — one key sets both)
    tasks:           claude-haiku-4-5
    build_slice:     claude-haiku-4-5
    reviewers:       claude-haiku-4-5
    fix:             claude-haiku-4-5
    # qa.yaml
    author_tests:    claude-haiku-4-5
    author_scenario: claude-haiku-4-5
    qa_fix:          claude-haiku-4-5

# =============================================================================
# Web dashboard — deterministic port for the Conductor `--web` UI.
# =============================================================================
# The port is a Conductor CLI flag (`--web-port`), NOT a workflow-YAML key
# (the schema rejects unknown keys) and NOT a workflow input (Conductor binds the
# web server before any workflow runs). The `maestro` wrapper reads `web.port`
# below and passes `--web-port <port>`, so the dashboard is reachable at a stable
# http://127.0.0.1:<port> every run. Change it here; default 8080.
web:
  port: 8080                  # dashboard port — read by the maestro wrapper
